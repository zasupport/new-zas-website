name: Deploy ZA Support Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type Check + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy-preview, deploy-production]
    if: failure()
    steps:
      - name: Log CI failure to error_inbox
        run: |
          curl -s -X POST "https://api.zasupport.com/api/v1/system/error-inbox" \
            -H "Authorization: Bearer ${{ secrets.AGENT_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"error_type\":\"build\",\"severity\":\"high\",\"service\":\"new-zas-website\",\"message\":\"CI failure on ${{ github.ref }} — run ${{ github.run_id }}\",\"detail\":{\"repo\":\"zasupport/new-zas-website\",\"run_url\":\"https://github.com/zasupport/new-zas-website/actions/runs/${{ github.run_id }}\",\"actor\":\"${{ github.actor }}\",\"event\":\"${{ github.event_name }}\"}}" \
            --max-time 10 || true
